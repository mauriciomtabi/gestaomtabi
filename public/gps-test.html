<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GPS Test — CBM</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;padding:1rem}
    h1{font-size:1rem;font-weight:900;text-transform:uppercase;letter-spacing:.1em;color:#60a5fa;margin-bottom:1rem}
    .card{background:#1e293b;border-radius:1rem;padding:1.25rem;margin-bottom:1rem;border:1px solid #334155}
    .row{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
    .label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#64748b}
    .value{font-size:.9rem;font-weight:700;color:#f1f5f9;word-break:break-all}
    .good{color:#4ade80}.warn{color:#fbbf24}.bad{color:#f87171}
    .btn{display:block;width:100%;padding:1rem;border-radius:.75rem;font-size:.75rem;font-weight:900;text-transform:uppercase;letter-spacing:.1em;border:none;cursor:pointer;margin-bottom:.75rem;transition:opacity .15s}
    .btn:disabled{opacity:.4;cursor:not-allowed}
    .btn-blue{background:#2563eb;color:#fff}
    .btn-green{background:#16a34a;color:#fff}
    .btn-orange{background:#ea580c;color:#fff}
    .btn-red{background:#dc2626;color:#fff}
    .log{font-size:.65rem;background:#0f172a;border-radius:.5rem;padding:.75rem;max-height:300px;overflow-y:auto;border:1px solid #334155;font-family:monospace;line-height:1.7}
    .ok{color:#4ade80}.err{color:#f87171}.info{color:#94a3b8}.hi{color:#7dd3fc}
    a.maps{display:block;padding:.6rem 1rem;background:#059669;border-radius:.75rem;color:#fff;font-weight:700;font-size:.75rem;text-align:center;text-decoration:none;margin-top:.5rem}
  </style>
</head>
<body>
<h1>📍 GPS Test — CBM</h1>

<div class="card">
  <div class="row"><span class="label">Status GPS</span><span class="value" id="gpsSt">Aguardando...</span></div>
  <div class="row"><span class="label">Precisão</span><span class="value" id="acc">—</span></div>
  <div class="row"><span class="label">Lat / Lng</span><span class="value" id="coords">—</span></div>
  <div class="row"><span class="label">Atualizar há</span><span class="value" id="age">—</span></div>
  <a id="mapsLink" class="maps" style="display:none" target="_blank">🗺 Abrir no Google Maps</a>
</div>

<button class="btn btn-blue"  onclick="startGps()">▶ Iniciar GPS (igual ao sistema)</button>
<button class="btn btn-green" onclick="simRegister()" id="btnReg" disabled>⚡ Simular Registro agora</button>
<button class="btn btn-red"   onclick="stopGps()">⏹ Parar GPS</button>

<div class="card">
  <div class="label" style="margin-bottom:.5rem">Log em tempo real</div>
  <div class="log" id="log"></div>
</div>

<script>
  /* Replica EXATA da lógica que está no FaceCheckIn.tsx */
  let watchIds = [];
  let bestPos = null;
  let t0 = null;

  function log(msg, cls='info'){
    const el = document.getElementById('log');
    const ts = t0 ? ((Date.now()-t0)/1000).toFixed(2)+'s' : '—';
    el.innerHTML += `<div class="${cls}">[${ts}] ${msg}</div>`;
    el.scrollTop = el.scrollHeight;
  }

  function elapsed(pos){
    return Math.round((Date.now() - pos.timestamp)/1000) + 's atrás';
  }

  function updateUI(pos){
    const acc = Math.round(pos.coords.accuracy);
    document.getElementById('gpsSt').textContent = `✓ Posição obtida`;
    document.getElementById('acc').textContent = `±${acc}m`;
    document.getElementById('acc').className = `value ${acc<=50?'good':acc<=200?'warn':'bad'}`;
    document.getElementById('coords').textContent = `${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)}`;
    document.getElementById('age').textContent = elapsed(pos);
    const link = document.getElementById('mapsLink');
    link.style.display = 'block';
    link.href = `https://www.google.com/maps?q=${pos.coords.latitude.toFixed(6)},${pos.coords.longitude.toFixed(6)}`;
    document.getElementById('btnReg').disabled = false;
  }

  function onPos(pos, method){
    const acc = Math.round(pos.coords.accuracy);
    const isNew = !bestPos || acc < bestPos.coords.accuracy;
    if(isNew){
      bestPos = pos;
      updateUI(pos);
      const cls = acc<=50?'ok':acc<=200?'':'err';
      log(`📍 [${method}] Lat:${pos.coords.latitude.toFixed(6)} Lng:${pos.coords.longitude.toFixed(6)} | ±${acc}m`, cls);
    } else {
      log(`↻  [${method}] ±${acc}m (não melhorou, mantendo ±${Math.round(bestPos.coords.accuracy)}m)`, 'info');
    }
  }

  function onErr(err, method){
    const msgs={1:'PERMISSION_DENIED',2:'POSITION_UNAVAILABLE',3:'TIMEOUT'};
    const msg = msgs[err.code]||err.message;
    if(err.code===1){
      log(`❌ [${method}] ${msg} — PERMISSÃO NEGADA`, 'err');
    } else {
      log(`⚠  [${method}] ${msg} — transitório, continua`, 'info');
    }
  }

  function startGps(){
    stopGps();
    bestPos = null;
    t0 = Date.now();
    document.getElementById('gpsSt').textContent = 'Capturando...';
    document.getElementById('btnReg').disabled = true;
    document.getElementById('mapsLink').style.display = 'none';
    document.getElementById('log').innerHTML = '';
    log('▶ GPS iniciado (3 métodos em paralelo)');

    if(!navigator.geolocation){ log('❌ Geolocalização não suportada','err'); return; }

    // MÉTODO 1: Wi-Fi/rede — rápido ~0.2s
    const id1 = navigator.geolocation.watchPosition(
      p => onPos(p,'watchLOW'),
      e => onErr(e,'watchLOW'),
      { enableHighAccuracy: false, maximumAge: 0, timeout: 15000 }
    );

    // MÉTODO 2: GPS chip (alta precisão) — refina em paralelo
    const id2 = navigator.geolocation.watchPosition(
      p => onPos(p,'watchHIGH'),
      e => onErr(e,'watchHIGH'),
      { enableHighAccuracy: true, maximumAge: 0, timeout: 15000 }
    );

    // MÉTODO 3: getCurrentPosition alta precisão
    navigator.geolocation.getCurrentPosition(
      p => onPos(p,'getHIGH'),
      e => onErr(e,'getHIGH'),
      { enableHighAccuracy: true, maximumAge: 0, timeout: 15000 }
    );

    watchIds = [id1, id2];
    log('⏳ Aguardando primeiro resultado...','info');

    // Atualiza o "X segundos atrás" periodicamente
    setInterval(() => {
      if(bestPos) document.getElementById('age').textContent = elapsed(bestPos);
    }, 1000);
  }

  function stopGps(){
    watchIds.forEach(id => navigator.geolocation.clearWatch(id));
    watchIds = [];
    log('⏹ GPS parado.');
  }

  function simRegister(){
    if(!bestPos){
      log('❌ Sem posição disponível para registrar!','err');
      return;
    }
    const lat = bestPos.coords.latitude.toFixed(6);
    const lng = bestPos.coords.longitude.toFixed(6);
    const acc = Math.round(bestPos.coords.accuracy);
    const age = Math.round((Date.now()-bestPos.timestamp)/1000);
    log(`✅ REGISTRO SIMULADO: Lat:${lat} Lng:${lng} | ±${acc}m | capturado há ${age}s`, 'ok');
    alert(`✅ Registro OK!\n\nLat: ${lat}\nLng: ${lng}\nPrecisão: ±${acc}m\nIdade: ${age}s`);
  }

  // Inicia GPS automaticamente ao carregar (igual ao sistema)
  window.onload = startGps;
</script>
</body>
</html>
