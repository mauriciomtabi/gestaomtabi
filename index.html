
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="description" content="Sistema de Gestão | CBM Sapucaia do Sul/RS" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Gestão CBM" />
    <link rel="apple-touch-icon" href="https://i.postimg.cc/T1nny2hc/Brasao-cbmrs.png" />
    <link rel="stylesheet" href="/index.css">
  </head>
  <body>
    <script>
      if ('serviceWorker' in navigator) {
        // Primeiro, remove SWs antigos para limpar cache corrompido
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          var hadOld = false;
          registrations.forEach(function(reg) {
            // Remove SWs antigos (sem o nome correto no cache)
            if (reg.active && reg.active.scriptURL && !reg.active.scriptURL.includes('sw.js')) {
              reg.unregister();
              hadOld = true;
            }
          });
        });

        // Registra o novo SW
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js').then(function(reg) {
            console.log('[App] Service Worker registrado:', reg.scope);
          }).catch(function(err) {
            console.warn('[App] Service Worker falhou:', err);
          });

          // Escuta notificação de atualização e recarrega automaticamente
          navigator.serviceWorker.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'SW_UPDATED') {
              window.location.reload();
            }
          });
        });
      }
    </script>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
